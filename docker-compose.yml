services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    command: >
      sh -lc "alembic upgrade head &&
              uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/app
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /code
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./:/code

  worker:
    build: .
    command: celery -A src.config.celery.celery worker -l INFO
    environment:
      DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/app
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /code
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      api:
        condition: service_started
    volumes:
      - ./:/code

volumes:
  postgres_data: